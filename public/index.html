<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chubiez YouTuber Finder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f5;color:#111;display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;overflow-y:auto}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid #e5e7eb}
.sidebar-header h1{font-size:15px;font-weight:600;color:#111}
.sidebar-header p{font-size:11px;color:#888;margin-top:2px}
.sidebar-section{padding:8px 0}
.sidebar-label{font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.05em;padding:6px 16px}
.sidebar-item{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;cursor:pointer;font-size:13px;color:#444;border-left:3px solid transparent}
.sidebar-item:hover{background:#f9fafb;color:#111}
.sidebar-item.active{background:#f0fdf4;color:#16a34a;border-left-color:#16a34a;font-weight:500}
.sidebar-item .count{background:#f3f4f6;color:#888;font-size:11px;padding:1px 7px;border-radius:99px}
.sidebar-item.active .count{background:#dcfce7;color:#16a34a}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.topbar-left{display:flex;flex-direction:column}
.topbar-left h2{font-size:16px;font-weight:600}
.topbar-left p{font-size:12px;color:#888;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.search-input{border:1px solid #e5e7eb;border-radius:8px;padding:7px 12px;font-size:13px;width:220px;outline:none;background:#f9fafb}
.search-input:focus{border-color:#16a34a;background:#fff}
.btn{padding:7px 16px;border-radius:8px;font-size:13px;cursor:pointer;border:none;font-weight:500}
.btn-primary{background:#16a34a;color:#fff}
.btn-primary:hover{background:#15803d}
.btn-primary:disabled{background:#86efac;cursor:not-allowed}
.btn-outline{background:#fff;color:#444;border:1px solid #e5e7eb}
.btn-outline:hover{background:#f9fafb}
.content{flex:1;overflow-y:auto;padding:20px 24px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px}
.stat-card .label{font-size:11px;color:#888;margin-bottom:4px}
.stat-card .value{font-size:22px;font-weight:600;color:#111}
.creator-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:18px 20px;margin-bottom:12px;display:flex;gap:16px;align-items:flex-start}
.avatar{width:48px;height:48px;border-radius:50%;background:#dcfce7;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:#16a34a;flex-shrink:0}
.creator-info{flex:1;min-width:0}
.creator-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.creator-name{font-size:15px;font-weight:600;color:#111}
.creator-handle{font-size:13px;color:#888}
.niche-badge{background:#f0fdf4;color:#16a34a;font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500}
.creator-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.meta-item .meta-label{font-size:10px;color:#aaa;margin-bottom:2px}
.meta-item .meta-value{font-size:13px;font-weight:500;color:#111}
.creator-footer{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.email-tag{font-size:12px;color:#555;background:#f9fafb;padding:3px 10px;border-radius:6px;border:1px solid #e5e7eb}
.yt-link{font-size:12px;color:#16a34a;text-decoration:none;font-weight:500}
.yt-link:hover{text-decoration:underline}
.date-tag{font-size:11px;color:#bbb;margin-left:auto}
.empty{text-align:center;padding:60px 20px;color:#aaa}
.empty h3{font-size:16px;margin-bottom:6px;color:#888}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot-green{background:#16a34a}
.dot-gray{background:#d1d5db}
.dot-orange{background:#f59e0b;animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo}=React;

function App(){
  const [status,setStatus]=useState({batchNumber:0,totalFound:0,lastRunAt:null,isRunning:false,hasApiKey:true});
  const [results,setResults]=useState([]);
  const [activeBatch,setActiveBatch]=useState('all');
  const [search,setSearch]=useState('');
  const [triggering,setTriggering]=useState(false);

  const fetchStatus=useCallback(async()=>{
    try{const r=await fetch('/api/status');const d=await r.json();setStatus(d);}catch(e){}
  },[]);

  const fetchResults=useCallback(async()=>{
    try{const r=await fetch('/api/results/all');const d=await r.json();setResults(Array.isArray(d)?d:[]);}catch(e){}
  },[]);

  useEffect(()=>{
    fetchStatus();fetchResults();
    const t=setInterval(()=>{fetchStatus();fetchResults();},8000);
    return()=>clearInterval(t);
  },[fetchStatus,fetchResults]);

  const batches=useMemo(()=>{
    const map={};
    results.forEach(r=>{
      const b=r.batch_number||r['Batch #']||1;
      if(!map[b])map[b]=[];
      map[b].push(r);
    });
    return map;
  },[results]);

  const batchKeys=Object.keys(batches).sort((a,b)=>Number(b)-Number(a));

  const activeResults=useMemo(()=>{
    const base=activeBatch==='all'?results:(batches[activeBatch]||[]);
    if(!search.trim())return base;
    const q=search.toLowerCase();
    return base.filter(r=>{
      const name=(r.first_name||r['First Name']||'').toLowerCase();
      const handle=(r.handle||r['Handle']||'').toLowerCase();
      const email=(r.email||r['Email']||'').toLowerCase();
      const niche=(r.niche||r['Niche']||'').toLowerCase();
      return name.includes(q)||handle.includes(q)||email.includes(q)||niche.includes(q);
    });
  },[results,batches,activeBatch,search]);

  const handleTrigger=async()=>{
    setTriggering(true);
    try{
      const r=await fetch('/api/trigger',{method:'POST'});
      const d=await r.json();
      if(!r.ok)alert('Error: '+d.error);
      else{fetchStatus();}
    }catch(e){alert('Connection error: '+e.message);}
    setTriggering(false);
  };

  const getInitials=name=>{
    if(!name||name==='Unknown')return '?';
    return name.slice(0,2).toUpperCase();
  };

  const fmt=n=>{
    if(n==null||n===''||n==='Not listed')return n||'—';
    const num=Number(n);
    if(isNaN(num))return n;
    if(num>=1000000)return (num/1000000).toFixed(1)+'M';
    if(num>=1000)return (num/1000).toFixed(1)+'K';
    return Math.round(num).toLocaleString();
  };

  const fmtRatio=n=>{
    const num=Number(n);
    if(isNaN(num))return '—';
    return (num*100).toFixed(1)+'%';
  };

  const batchTitle=activeBatch==='all'?'All creators':`Batch ${activeBatch}`;
  const batchDate=activeBatch!=='all'&&batches[activeBatch]?.[0]?.date_found||batches[activeBatch]?.[0]?.['Date Found']:'';

  return(
    <>
    <div className="sidebar">
      <div className="sidebar-header">
        <h1>Chubiez finder</h1>
        <p>
          <span className={`status-dot ${status.isRunning?'dot-orange':status.hasApiKey?'dot-green':'dot-gray'}`}></span>
          {status.isRunning?'Running...':status.hasApiKey?'Ready':'No API key'}
        </p>
      </div>
      <div className="sidebar-section">
        <div className="sidebar-label">Views</div>
        <div className={`sidebar-item ${activeBatch==='all'?'active':''}`} onClick={()=>setActiveBatch('all')}>
          All creators <span className="count">{results.length}</span>
        </div>
      </div>
      {batchKeys.length>0&&(
        <div className="sidebar-section">
          <div className="sidebar-label">Batches</div>
          {batchKeys.map(b=>(
            <div key={b} className={`sidebar-item ${activeBatch===b?'active':''}`} onClick={()=>setActiveBatch(b)}>
              Batch {b} <span className="count">{batches[b].length}</span>
            </div>
          ))}
        </div>
      )}
    </div>

    <div className="main">
      <div className="topbar">
        <div className="topbar-left">
          <h2>{batchTitle}</h2>
          <p>{batchDate?`Found on ${batchDate}`:`${activeResults.length} creators`}</p>
        </div>
        <div className="topbar-right">
          <input className="search-input" placeholder="Search name, handle, niche..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <a href="/api/download" className="btn btn-outline" style={{textDecoration:'none'}}>Download .xlsx</a>
          <button className="btn btn-primary" onClick={handleTrigger} disabled={triggering||status.isRunning}>
            {(triggering||status.isRunning)?<><span className="spinner"></span>Running...</>:'Run now'}
          </button>
        </div>
      </div>

      <div className="content">
        <div className="stats-row">
          <div className="stat-card"><div className="label">Total found</div><div className="value">{results.length}</div></div>
          <div className="stat-card"><div className="label">Batches run</div><div className="value">{batchKeys.length||status.batchNumber}</div></div>
          <div className="stat-card"><div className="label">Showing</div><div className="value">{activeResults.length}</div></div>
        </div>

        {activeResults.length===0?(
          <div className="empty">
            <h3>{results.length===0?'No creators yet':'No results match your search'}</h3>
            <p>{results.length===0?'Click "Run now" to start finding YouTubers':'Try a different search term'}</p>
          </div>
        ):activeResults.map((r,i)=>{
          const name=r.first_name||r['First Name']||'Unknown';
          const handle=r.handle||r['Handle']||'';
          const email=r.email||r['Email']||'Not listed';
          const avgViews=r.avg_views||r['Avg Views'];
          const avgLikes=r.avg_likes||r['Avg Likes'];
          const avgComments=r.avg_comments||r['Avg Comments'];
          const likeRatio=r.like_ratio||r['Like Ratio'];
          const commentRatio=r.comment_ratio||r['Comment Ratio'];
          const subs=r.subscriber_count||r['Subscribers'];
          const niche=r.niche||r['Niche']||'';
          const url=r.channel_url||r['Channel URL']||'';
          const date=r.date_found||r['Date Found']||'';
          return(
            <div key={i} className="creator-card">
              <div className="avatar">{getInitials(name)}</div>
              <div className="creator-info">
                <div className="creator-top">
                  <span className="creator-name">{name}</span>
                  <span className="creator-handle">{handle}</span>
                  {niche&&<span className="niche-badge">{niche}</span>}
                </div>
                <div className="creator-meta">
                  <div className="meta-item"><div className="meta-label">Avg views</div><div className="meta-value">{fmt(avgViews)}</div></div>
                  <div className="meta-item"><div className="meta-label">Avg likes</div><div className="meta-value">{fmt(avgLikes)}</div></div>
                  <div className="meta-item"><div className="meta-label">Like ratio</div><div className="meta-value">{fmtRatio(likeRatio)}</div></div>
                  <div className="meta-item"><div className="meta-label">Comment ratio</div><div className="meta-value">{fmtRatio(commentRatio)}</div></div>
                  <div className="meta-item"><div className="meta-label">Avg comments</div><div className="meta-value">{fmt(avgComments)}</div></div>
                  <div className="meta-item"><div className="meta-label">Subscribers</div><div className="meta-value">{fmt(subs)}</div></div>
                </div>
                <div className="creator-footer">
                  <span className="email-tag">{email}</span>
                  {url&&<a className="yt-link" href={url} target="_blank" rel="noopener">View channel →</a>}
                  {date&&<span className="date-tag">{date}</span>}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
